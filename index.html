<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทะเบียนรับบริจาค - รพร.สว่างแดนดิน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f8fafc; }
        .loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: none;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #e2e8f0;
            border-top: 5px solid #2563eb; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="loader" class="loader-wrapper">
        <div class="text-center">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-blue-600 font-semibold">กำลังดำเนินการ...</p>
        </div>
    </div>

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://img5.pic.in.th/file/secure-sv1/LOGO-cafca2d6a59fd064.png" class="h-12">
                <h1 class="font-bold text-xl text-slate-800 hidden md:block">ทะเบียนรับบริจาค รพร.สว่างแดนดิน</h1>
            </div>
            <div id="nav-menu" class="hidden space-x-2">
                <button onclick="switchTab('form')" class="px-4 py-2 hover:bg-blue-50 rounded-lg transition text-blue-600 font-medium">บันทึกข้อมูล</button>
                <button onclick="switchTab('report')" class="px-4 py-2 hover:bg-blue-50 rounded-lg transition text-blue-600 font-medium">รายงาน</button>
                <button onclick="location.reload()" class="px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg">ออก</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        
        <div id="fund-selection" class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto mt-10">
            <div onclick="selectFund('sangha')" class="cursor-pointer group">
                <div class="bg-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition-all border-b-8 border-orange-500 text-center">
                    <img src="https://img2.pic.in.th/LINE_ALBUM_442025_260124_2.jpg" class="h-40 mx-auto rounded-2xl mb-6 group-hover:scale-105 transition">
                    <h2 class="text-2xl font-bold text-slate-800">กองทุนสงฆ์อาพาธ</h2>
                </div>
            </div>
            <div onclick="selectFund('medical')" class="cursor-pointer group">
                <div class="bg-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition-all border-b-8 border-blue-600 text-center">
                    <img src="https://img2.pic.in.th/LINE_ALBUM_442025_260124_1.jpg" class="h-40 mx-auto rounded-2xl mb-6 group-hover:scale-105 transition">
                    <h2 class="text-2xl font-bold text-slate-800">กองทุนเครื่องมือแพทย์</h2>
                </div>
            </div>
        </div>

        <div id="section-form" class="hidden max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-lg border border-slate-100">
            <h2 id="form-title" class="text-2xl font-bold mb-6 text-slate-800 border-l-4 border-blue-600 pl-4">บันทึกข้อมูลบริจาค</h2>
            <form id="donationForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-2">เลขที่รับเงิน (E-Donation)</label>
                    <input type="text" id="receiptNo" class="w-full p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">วันที่บริจาค</label>
                    <input type="text" id="dateInput" class="w-full p-3 bg-slate-50 border rounded-xl" placeholder="วว/ดด/ปปปป">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">เลขประจำตัวผู้เสียภาษี</label>
                    <input type="text" id="taxId" class="w-full p-3 bg-slate-50 border rounded-xl" maxlength="13">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-2">ชื่อ-สกุลผู้บริจาค</label>
                    <input type="text" id="donorName" class="w-full p-3 bg-slate-50 border rounded-xl" required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-2">บริจาคเพื่อ</label>
                    <textarea id="purpose" rows="2" class="w-full p-3 bg-slate-50 border rounded-xl"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">จำนวนเงิน (บาท)</label>
                    <input type="number" id="amount" oninput="updateThaiText(this.value)" class="w-full p-3 border-2 border-blue-100 rounded-xl text-xl font-bold text-blue-700">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">จำนวนเงินตัวอักษร</label>
                    <input type="text" id="amountThai" class="w-full p-3 bg-gray-100 border rounded-xl" readonly>
                </div>
                <button type="button" onclick="submitData()" class="md:col-span-2 bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-200">
                    บันทึกข้อมูลและออกใบเสร็จ
                </button>
            </form>
        </div>

        <div id="section-report" class="hidden bg-white p-6 rounded-3xl shadow-lg border border-slate-100">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold text-slate-800">รายงานการรับบริจาค</h2>
                <div class="flex gap-2">
                    <input type="text" id="searchBox" oninput="filterTable()" placeholder="ค้นชื่อ / เลขภาษี..." class="p-2 border rounded-lg">
                    <button class="bg-slate-800 text-white px-4 py-2 rounded-lg">ดาวน์โหลด PDF</button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 uppercase text-xs font-bold">
                            <th class="p-4 border-b">วันที่</th>
                            <th class="p-4 border-b">เลขที่รับเงิน</th>
                            <th class="p-4 border-b">ชื่อผู้บริจาค</th>
                            <th class="p-4 border-b text-right">จำนวนเงิน</th>
                            <th class="p-4 border-b text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="reportTable"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        const API_URL = "YOUR_GAS_WEB_APP_URL"; // *** เปลี่ยนเป็น URL ของคุณ ***
        let currentFund = "";
        let fundNameFull = "";

        function toggleLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        function selectFund(type) {
            toggleLoader(true);
            setTimeout(() => {
                currentFund = type;
                fundNameFull = type === 'sangha' ? 'กองทุนสงฆ์อาพาธ' : 'กองทุนเครื่องมือแพทย์';
                
                document.getElementById('fund-selection').classList.add('hidden');
                document.getElementById('section-form').classList.remove('hidden');
                document.getElementById('nav-menu').classList.remove('hidden');
                
                // ตั้งค่าเริ่มต้น
                const today = new Date();
                const thaiYear = today.getFullYear() + 543;
                const formattedDate = `${today.getDate().toString().padStart(2,'0')}/${(today.getMonth()+1).toString().padStart(2,'0')}/${thaiYear}`;
                document.getElementById('dateInput').value = formattedDate;

                if(type === 'sangha') {
                    document.getElementById('purpose').value = "สมทบทุนกองทุนหอสงฆ์อาพาธ โรงพยาบาลสมเด็จพระยุพราชสว่างแดนดิน";
                } else {
                    document.getElementById('purpose').value = "สมทบทุนกองทุนจัดซื้อเครื่องมือแพทย์ โรงพยาบาลสมเด็จพระยุพราชสว่างแดนดิน";
                }
                
                toggleLoader(false);
            }, 800);
        }

        function switchTab(tab) {
            document.getElementById('section-form').classList.add('hidden');
            document.getElementById('section-report').classList.add('hidden');
            document.getElementById('section-' + tab).classList.remove('hidden');
            if(tab === 'report') loadReport();
        }

        function updateThaiText(num) {
            // ฟังก์ชันแปลงบาทถ้วนเบื้องต้น
            if(!num) return document.getElementById('amountThai').value = "";
            document.getElementById('amountThai').value = "(" + Number(num).toLocaleString() + " บาทถ้วน)";
        }

        async function submitData() {
            const data = {
                fundType: fundNameFull,
                receiptNo: document.getElementById('receiptNo').value,
                date: document.getElementById('dateInput').value,
                name: document.getElementById('donorName').value,
                taxId: document.getElementById('taxId').value,
                purpose: document.getElementById('purpose').value,
                amount: document.getElementById('amount').value,
                amountThai: document.getElementById('amountThai').value,
                note: ""
            };

            if(!data.receiptNo || !data.name || !data.amount) {
                Swal.fire('กรุณากรอกข้อมูลให้ครบถ้วน', '', 'warning');
                return;
            }

            toggleLoader(true);
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // สำหรับ GAS
                    body: JSON.stringify({ action: 'save', data: data })
                });
                Swal.fire('สำเร็จ!', 'บันทึกข้อมูลการบริจาคเรียบร้อยแล้ว', 'success');
                document.getElementById('donationForm').reset();
            } catch (e) {
                Swal.fire('เกิดข้อผิดพลาด', 'กรุณาตรวจสอบการเชื่อมต่อ API', 'error');
            }
            toggleLoader(false);
        }

        async function loadReport() {
            toggleLoader(true);
            try {
                const res = await fetch(`${API_URL}?action=getReport&fundType=${fundNameFull}`);
                const json = await res.json();
                const tbody = document.getElementById('reportTable');
                tbody.innerHTML = json.data.map(row => `
                    <tr class="hover:bg-slate-50 border-b">
                        <td class="p-4">${row[3]}</td>
                        <td class="p-4 font-mono text-sm">${row[2]}</td>
                        <td class="p-4 font-semibold">${row[4]}</td>
                        <td class="p-4 text-right text-blue-600 font-bold">${Number(row[7]).toLocaleString()}</td>
                        <td class="p-4 text-center">
                            <button class="text-blue-500 mr-2">แก้ไข</button>
                            <button class="text-red-400">ลบ</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
            }
            toggleLoader(false);
        }
    </script>
</body>
</html>
