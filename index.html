<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทะเบียนรับบริจาค รพร.สว่างแดนดิน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- เพิ่มฟอนต์ Charm และ Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* บังคับใช้ Sarabun ทั้งระบบ ยกเว้นจุดที่ระบุเป็น Charm */
        * { font-family: 'Sarabun', sans-serif !important; }
        .font-charm { font-family: 'Charm', cursive !important; }
        /* คลาสสำหรับสีน้ำเงิน Charm */
        .text-charm-blue { color: #1e3a8a !important; } 
        body { background-color: #f8fafc; margin: 0; padding: 0; }
        
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .modern-spinner {
            width: 64px; height: 64px; border: 6px solid #e2e8f0; border-top: 6px solid #2563eb;
            border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-header { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }

        /* --- สไตล์สำหรับงานพิมพ์ (A5 Landscape) --- */
        @media print {
            @page { size: A5 landscape; margin: 0; }
            html, body { height: 148mm; width: 210mm; overflow: hidden; margin: 0 !important; padding: 0 !important; }
            body * { visibility: hidden; }
            header, main, .loader-overlay, .swal2-container { display: none !important; }
            
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                display: block !important;
                position: fixed; top: 0; left: 0;
                width: 210mm; height: 148mm;
                padding: 10mm 15mm; 
                background: white; color: black;
                box-sizing: border-box;
            }
            .print-blue { color: #1e3a8a !important; }
        }
        #print-area { display: none; }
    </style>
</head>
<body>

    <!-- พื้นที่สำหรับพิมพ์เอกสาร -->
    <div id="print-area">
        <!-- เนื้อหาจะถูกฉีดเข้ามาด้วย JavaScript ตามประเภทเอกสารที่เลือก -->
    </div>

    <!-- UI หน้าเว็บปกติ -->
    <div id="loader" class="loader-overlay"><div class="modern-spinner"></div></div>

    <!-- Header เมื่อเข้าระบบแล้ว -->
    <header id="main-header" class="glass-header text-white shadow-xl sticky top-0 z-50 py-3 px-6 hidden">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://img2.pic.in.th/LINE_ALBUM_442025_260124_1.jpg" class="h-10 w-10 rounded-full border-2 border-white shadow">
                <div>
                    <h1 class="font-bold text-lg leading-tight hidden md:block">ทะเบียนรับบริจาค รพร.สว่างแดนดิน</h1>
                    <div id="fund-badge" class="bg-white/20 px-3 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider inline-block mt-1">
                        <span id="header-fund-name"></span>
                    </div>
                </div>
            </div>
            <nav class="flex items-center gap-3">
                <button onclick="backToModeSelection()" class="hover:bg-white/20 p-2 rounded-lg transition" title="สลับโหมด"><i data-lucide="layout-grid" class="w-6 h-6 text-white"></i></button>
                <button onclick="location.reload()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-xl font-bold text-xs shadow-lg transition">ออกจากระบบ</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-6">
        <!-- 1. หน้าเลือกกองทุน -->
        <div id="fund-selection" class="flex flex-col items-center justify-center min-h-[80vh] text-center">
            <h2 class="text-3xl font-black text-slate-800 mb-10">ระบบทะเบียนรับบริจาค โรงพยาบาลสมเด็จพระยุพราชสว่างแดนดิน</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-4xl px-4">
                <div onclick="selectFund('sangha')" class="group cursor-pointer bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-orange-200 transition-all border-t-[12px] border-orange-500 hover:-translate-y-2">
                    <img src="https://img5.pic.in.th/file/secure-sv1/LOGO-cafca2d6a59fd064.png" class="h-32 mx-auto mb-6 group-hover:scale-110 transition">
                    <h3 class="text-2xl font-black text-orange-600">กองทุนสงฆ์อาพาธ</h3>
                </div>
                <div onclick="selectFund('medical')" class="group cursor-pointer bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-blue-200 transition-all border-t-[12px] border-blue-600 hover:-translate-y-2">
                    <img src="https://img2.pic.in.th/LINE_ALBUM_442025_260124_2.jpg" class="h-32 mx-auto mb-6 group-hover:scale-110 transition">
                    <h3 class="text-2xl font-black text-blue-700">กองทุนเครื่องมือแพทย์</h3>
                </div>
            </div>
        </div>

        <!-- 2. หน้าเลือกโหมดการทำงาน -->
        <div id="mode-selection" class="hidden flex flex-col items-center justify-center min-h-[70vh] text-center">
            <h2 class="text-2xl font-bold mb-8 text-slate-700">เลือกประเภทงาน <span id="target-fund-name" class="text-blue-600"></span></h2>
            <div class="flex flex-wrap justify-center gap-8">
                <button onclick="enterMode('ED')" class="bg-blue-800 text-white p-10 rounded-3xl shadow-xl w-72 hover:bg-blue-900 transition transform hover:scale-105">
                    <i data-lucide="zap" class="mx-auto w-14 h-14 mb-4"></i>
                    <div class="text-2xl font-bold">E-Donation</div>
                    <p class="text-sm opacity-70 mt-2">ระบบบันทึกอิเล็กทรอนิกส์</p>
                </button>
                <button onclick="enterMode('CM')" class="bg-emerald-700 text-white p-10 rounded-3xl shadow-xl w-72 hover:bg-emerald-800 transition transform hover:scale-105">
                    <i data-lucide="scroll" class="mx-auto w-14 h-14 mb-4"></i>
                    <div class="text-2xl font-bold">ใบอนุโมทนาบัตร</div>
                    <p class="text-sm opacity-70 mt-2">ใบรับบริจาคแบบธรรมดา</p>
                </button>
            </div>
        </div>

        <!-- 3. หน้าจอหลัก (Split Screen) -->
        <div id="main-content" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
            <!-- ฝั่งซ้าย: ทะเบียน -->
            <div class="lg:col-span-7 bg-white rounded-3xl shadow-xl border overflow-hidden">
                <div class="p-4 bg-slate-50 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                    <h3 class="font-bold text-slate-800 text-lg flex items-center gap-2">
                        <i data-lucide="archive" class="w-5 h-5 text-blue-600"></i>
                        <span id="table-title">ทะเบียนล่าสุด</span>
                    </h3>
                    <div class="relative w-full md:w-64">
                        <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="searchInput" oninput="filterTable()" placeholder="ค้นชื่่อ / เลขที่..." class="w-full pl-10 pr-4 py-2 text-sm border rounded-full focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                </div>
                <div class="table-container overflow-y-auto max-h-[620px]">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-800 text-white text-xs uppercase sticky top-0 z-10 font-sarabun">
                            <tr>
                                <th class="p-4">วันที่</th>
                                <th class="p-4">เลขที่อ้างอิง</th>
                                <th class="p-4">ชื่อผู้บริจาค</th>
                                <th class="p-4 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="quick-table-body" class="divide-y text-sm"></tbody>
                    </table>
                </div>
            </div>

            <!-- ฝั่งขวา: แบบฟอร์ม -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-2xl p-6 md:p-8 border-t-8" id="form-card">
                <h3 id="form-title" class="text-2xl font-black text-slate-800 mb-6 border-b pb-4">📝 บันทึกข้อมูลใหม่</h3>
                <form id="donationForm" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    
                    <div id="ed-specific-fields">
                        <label class="block text-xs font-black text-slate-500 uppercase mb-1">เลขที่รับเงิน (E-DONATION)</label>
                        <input type="text" id="receiptNo" class="w-full p-3 bg-slate-100 border rounded-xl outline-none focus:border-blue-500 mb-4 font-bold">
                        
                        <label class="block text-xs font-black text-slate-500 uppercase mb-1">เลขประจำตัวผู้เสียภาษี</label>
                        <input type="text" id="taxId" class="w-full p-3 bg-slate-100 border rounded-xl mb-4 font-bold" maxlength="13">
                    </div>

                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase mb-1">วันที่บริจาค (พ.ศ.)</label>
                        <input type="text" id="dateInput" class="w-full p-3 bg-slate-100 border rounded-xl mb-4 font-bold" placeholder="วว/ดด/ปปปป">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-black text-slate-500 mb-1 uppercase">ชื่อ-สกุลผู้บริจาค</label>
                        <input type="text" id="donorName" class="w-full p-3 bg-slate-100 border rounded-xl outline-none focus:border-blue-500 font-bold text-lg" required>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-slate-500 mb-1 uppercase">บริจาคเพื่อ</label>
                        <textarea id="purpose" rows="2" class="w-full p-3 bg-slate-100 border rounded-xl text-sm italic font-medium"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-blue-600 uppercase">จำนวนเงิน (บาท)</label>
                        <input type="number" id="amount" oninput="updateThaiText(this.value)" class="w-full p-4 bg-blue-50 border-2 border-blue-200 rounded-2xl text-4xl font-black text-blue-700 text-center outline-none">
                        <p id="amountThai" class="mt-2 text-sm text-blue-600 font-bold h-4 italic text-center"></p>
                    </div>

                    <button type="button" onclick="submitData()" id="submit-btn" class="w-full text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:shadow-2xl transition-all flex justify-center items-center gap-3">
                        <i data-lucide="check-circle" class="w-6 h-6 text-white"></i> <span id="btn-text">บันทึกข้อมูล</span>
                    </button>
                    <button type="button" onclick="resetForm()" id="cancel-btn" class="hidden w-full text-red-500 text-sm font-bold py-2 text-center hover:underline">ยกเลิกการแก้ไข</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby-y6yAxJfU_0odsmq5OTpTir62XNjXqwR9a4oI0py9pTYnW5qu3jvYPpj8P3pH5Pex/exec";
        let currentFund = "";
        let fundNameFull = "";
        let currentMode = ""; // ED or CM
        let records = [];
        let isEditMode = false;

        const SETTINGS = {
            sangha: {
                org: "วัดศรีสว่างแดนดิน ตำบลสว่างแดนดิน อำเภอ สว่างแดนดิน จังหวัด สกลนคร",
                signer: "พระครูยุตตธรรมมานุศาสน์ ยุตตธัมโม",
                role: "เจ้าอาวาสวัดศรีสว่างแดนดิน",
                note: "กองทุนสงฆ์อาพาธ โรงพยาบาลสมเด็จพระยุพราชสว่างแดนดิน ผู้รับมอบอำนาจจากหน่วยบริจาค"
            },
            medical: {
                org: "วัดภูตะคาม ตำบลท่าศิลา อำเภอส่องดาว จังหวัดสกลนคร",
                signer: "พระครูเมตตาสันตยาธิคุณ",
                role: "เจ้าอาวาสวัดภูตะคาม",
                note: "กองทุนจัดซื้อเครื่องมือแพทย์ โรงพยาบาลสมเด็จพระยุพราชสว่างแดนดิน ผู้รับมอบอำนาจจากหน่วยบริจาค"
            }
        };

        const thMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function toThaiNum(n) { return n.toString().replace(/\d/g, d => "๐๑๒๓๔๕๖๗๘๙"[d]); }

        function selectFund(f) {
            currentFund = f;
            fundNameFull = (f === 'sangha') ? 'กองทุนสงฆ์อาพาธ' : 'กองทุนเครื่องมือแพทย์';
            document.getElementById('fund-selection').classList.add('hidden');
            document.getElementById('mode-selection').classList.remove('hidden');
            document.getElementById('target-fund-name').innerText = fundNameFull;
            lucide.createIcons();
        }

        function enterMode(m) {
            currentMode = m;
            document.getElementById('mode-selection').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('header-fund-name').innerText = (m === 'ED' ? 'E-DONATION' : 'ใบอนุโมทนา') + ': ' + fundNameFull;
            
            const btn = document.getElementById('submit-btn');
            const card = document.getElementById('form-card');
            const tableTitle = document.getElementById('table-title');
            const edFields = document.getElementById('ed-specific-fields');
            
            if(m === 'ED') {
                tableTitle.innerText = "ทะเบียน E-Donation " + fundNameFull;
                edFields.style.display = 'block';
                btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                btn.classList.remove('bg-emerald-600', 'hover:bg-emerald-700');
                card.classList.add('border-blue-600');
                card.classList.remove('border-emerald-600');
            } else {
                tableTitle.innerText = "ทะเบียนออกใบอนุโมทนาบัตร " + fundNameFull;
                edFields.style.display = 'none';
                btn.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                card.classList.add('border-emerald-600');
                card.classList.remove('border-blue-600');
            }
            resetForm();
            loadReport();
        }

        function backToModeSelection() {
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('mode-selection').classList.remove('hidden');
        }

        function parseDate(str) {
            if (!str) return { d: 1, m: 1, y: 2500 };
            let s = str.toString();
            if (s.includes('T')) {
                const parts = s.split('T')[0].split('-');
                let y = parseInt(parts[0]); if(y < 2500) y += 543;
                return { y: y, m: parseInt(parts[1]), d: parseInt(parts[2]) };
            }
            if (s.includes('/')) {
                const parts = s.split('/');
                return { d: parseInt(parts[0]), m: parseInt(parts[1]), y: parseInt(parts[2]) };
            }
            return { d: 1, m: 1, y: 2500 };
        }

        function formatDateShort(str) {
            const dt = parseDate(str);
            return `${dt.d.toString().padStart(2, '0')}/${dt.m.toString().padStart(2, '0')}/${dt.y}`;
        }

        function printRecord(id) {
            const row = records.find(r => String(r[0]) === String(id));
            if (!row) return;

            const s = SETTINGS[currentFund];
            const printArea = document.getElementById('print-area');

            if (currentMode === 'ED') {
                // พิมพ์ E-Donation (คงเดิม)
                const now = new Date();
                const timestamp = now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH');
                printArea.innerHTML = `
                    <div class="flex justify-between items-start border-b-2 border-black pb-1 mb-2">
                        <div class="w-[62%]">
                            <img src="https://tippayarat.ac.th/wp-content/uploads/2023/01/icon-e-donation.png" class="h-12 w-auto mb-1 object-contain">
                            <div class="leading-tight">
                                <h1 class="text-lg font-bold mb-0.5">${s.org}</h1>
                                <p class="text-[8.5pt] text-gray-700"></p>
                                <p class="text-[9.5pt] font-bold">เลขที่หน่วยรับบริจาค: <span class="print-blue"></span></p>
                            </div>
                        </div>
                        <div class="text-right w-[38%]">
                            <h2 class="text-2xl font-bold text-[#1e3a8a] mb-0">ใบรับเงินบริจาค</h2>
                            <p class="text-[8pt] font-bold text-gray-600">ระบบบริจาคอิเล็กทรอนิกส์ (e-Donation) กรมสรรพากร</p>
                            <div class="mt-2 text-[10pt] space-y-0 text-gray-800">
                                <p>เลขที่อ้างอิง: <span class="font-bold print-blue">${row[4]}</span></p>
                                <p>วันที่บริจาค: <span class="font-bold print-blue">${formatDateThaiFull(row[5])}</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3 mt-6 mb-2 px-1">
                        <div class="flex items-center gap-4">
                            <span class="w-40 font-bold text-[12pt] shrink-0">ชื่อผู้บริจาค:</span>
                            <span class="flex-1 font-bold text-[16pt] print-blue leading-none">${row[6]}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="w-40 font-bold text-[12pt] shrink-0 whitespace-nowrap">เลขประจำตัวผู้เสียภาษี:</span>
                            <span class="flex-1 text-[16pt] font-bold print-blue tracking-wider leading-none">${row[7]}</span>
                        </div>
                        <div class="flex items-start gap-4">
                            <span class="w-40 font-bold text-[12pt] shrink-0">บริจาคเพื่อ:</span>
                            <span class="flex-1 text-[12pt] print-blue leading-tight font-semibold">${row[8]}</span>
                        </div>
                        <div class="flex items-center gap-4 pt-1">
                            <div class="flex flex-1 items-center gap-2">
                                <span class="w-40 font-bold text-[12pt] shrink-0">จำนวนเงิน:</span>
                                <span class="flex-1 font-bold text-2xl text-center print-blue border-b-2 border-black px-2">${Number(row[9]).toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                                <span class="font-bold text-[12pt]">บาท</span>
                            </div>
                            <div class="flex flex-[1.4] items-center ml-4">
                                <span class="flex-1 text-center font-bold text-[16pt] print-blue border-b-2 border-black">${row[10]}</span>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 mt-8 items-end min-h-[140px]">
                        <div class="text-[7.5pt] leading-tight space-y-0.5 pr-4 text-gray-600">
                            <p class="font-bold underline text-[8pt] text-black">หมายเหตุ:</p>
                            <p class="font-bold">1. ${s.note}</p>
                            <p>2. ข้อมูลบริจาคของท่านได้บันทึกในระบบ e-Donation ตรวจสอบได้ที่เว็บไซต์กรมสรรพากร (www.rd.go.th)</p>
                            <p>3. กรมสรรพากรเป็นเพียงผู้ให้บริการระบบ กรณีแก้ไขโปรดติดต่อหน่วยรับบริจาคโดยตรง</p>
                            <div class="pt-3 text-gray-400 text-[6.5pt] italic">วันที่พิมพ์เอกสาร: ${timestamp}</div>
                        </div>
                        <div class="flex flex-col items-end">
                            <div class="text-center w-full max-w-[340px]">
                                <p class="font-bold text-[16pt] print-blue mb-1">(${s.signer})</p>
                                <p class="text-[11pt] font-bold">ผู้มีอำนาจลงนาม</p>
                                <div class="mt-3">
                                    <p class="text-[7pt] text-gray-500 italic leading-snug">
                                        เอกสารนี้จัดทำในรูปแบบอิเล็กทรอนิกส์ จึงไม่มีลายมือชื่อกำกับ <br>
                                        ทั้งนี้ให้ถือว่าเอกสารดังกล่าวมีผลสมบูรณ์ตามข้อมูลที่ปรากฏ
                                    </p>
                                </div>
                            </div>
                            <div class="absolute bottom-[-5px] right-[-5px]"><img src="https://img2.pic.in.th/RD.png" class="h-16 w-16 object-contain opacity-80"></div>
                        </div>
                    </div>
                `;
            } else {
                // พิมพ์ใบอนุโมทนาธรรมดา (ปรับปรุงตามที่ขอ)
                const dt = parseDate(row[5]);
                printArea.innerHTML = `
                    <div class="text-center font-sarabun relative">
                        <!-- ตราธรรมจักร กึ่งกลาง -->
                        <div class="mb-4 text-center">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Buddhism_dham_jak.svg/250px-Buddhism_dham_jak.svg.png" class="h-24 w-24 mx-auto">
                        </div>

                        <!-- เลขที่ ขวาบน (ใช้ฟอนต์ Charm สีน้ำเงิน) -->
                        <div class="absolute top-2 right-2 text-[11pt] font-bold">
                            เลขที่ <span class="font-charm text-charm-blue">${toThaiNum(row[3])}</span>
                        </div>

                        <!-- ชื่อวัด -->
                        <p class="font-bold text-xl mb-2">${s.org}</p>

                        <!-- หัวข้อ อนุโมทนาบัตร (สีน้ำเงิน Charm) -->
                        <h2 class="font-charm text-4xl font-bold mb-4 text-charm-blue">อนุโมทนาบัตร</h2>

                        <div class="text-lg leading-relaxed space-y-4 px-6">
                            <p class="text-lg">ขออนุโมทนา แด่</p>
                            <!-- ชื่อผู้บริจาค (สีน้ำเงิน Charm) -->
                            <p class="font-charm text-4xl font-bold text-charm-blue py-2">${row[6]}</p>

                            <!-- จำนวนเงิน (จัดรูปแบบใหม่) -->
                            <p class="text-xl">
                                บริจาคเงินจำนวน
                                <span class="font-charm text-2xl font-bold text-charm-blue px-2 mx-1 border-b-2 border-blue-900">${toThaiNum(Number(row[9]).toLocaleString())}</span>
                                บาท
                                <span class="font-charm text-xl font-bold text-charm-blue">(<span id="pc-amount-thai">${row[10]}</span>)</span>
                            </p>

                            <!-- วัตถุประสงค์ -->
                            <p class="text-[12pt] leading-tight pt-2">เพื่อสมทบทุน ${row[8]}</p>

                            <!-- คำอวยพร -->
                            <p class="text-[11pt] px-8 pt-4 leading-snug">
                                ขออำนาจคุณพระศรีรัตนตรัย และบุญกุศลบำเพ็ญนี้ จงดลบันดาลให้ท่านและครอบครัวเจริญด้วยอายุ วรรณะ สุขะ พละ ปฏิภาณ ธนสานสมบัติ และประสบสิ่งอันพึงปรารถนา ตลอดกาลทุดเมื่อ เทอญ
                            </p>

                            <!-- วันที่ -->
                            <p class="pt-4 text-[13pt] font-bold">ณ วันที่ ${toThaiNum(dt.d)} เดือน ${thMonths[dt.m-1]} พุทธศักราช ${toThaiNum(dt.y)}</p>
                        </div>

                        <!-- ผู้ลงนาม -->
                        <div class="mt-10 flex flex-col items-center">
                            <div class="text-center">
                                <p class="font-bold text-2xl mb-1">(${s.signer})</p>
                                <p class="text-[12pt] font-bold">${s.role}</p>
                            </div>
                            <!-- ข้อความกำกับ -->
                            <p class="text-[8pt] text-gray-500 mt-6 italic">เอกสารนี้จัดทำในรูปแบบอิเล็กทรอนิกส์ จึงไม่มีลายมือชื่อกำกับ ทั้งนี้ให้ถือว่าเอกสารดังกล่าวมีผลสมบูรณ์ตามข้อมูลที่ปรากฏ</p>
                        </div>
                    </div>
                `;
            }

            setTimeout(() => { window.print(); }, 250);
        }

        async function submitData() {
            const data = {
                id: document.getElementById('edit-id').value,
                fundType: fundNameFull,
                mode: currentMode,
                receiptNo: document.getElementById('receiptNo').value,
                date: document.getElementById('dateInput').value,
                name: document.getElementById('donorName').value,
                taxId: document.getElementById('taxId').value,
                purpose: document.getElementById('purpose').value,
                amount: document.getElementById('amount').value,
                amountThai: document.getElementById('amountThai').innerText
            };

            if(!data.name || !data.amount || !data.date) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกวันที่ ชื่อ และจำนวนเงิน', 'warning');
                return;
            }

            toggleLoader(true);
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: isEditMode ? 'update' : 'save', data: data })
                });
                Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', showConfirmButton: false, timer: 1500 });
                resetForm();
                loadReport();
            } catch (e) { Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'โปรดลองอีกครั้ง' }); }
            toggleLoader(false);
        }

        async function loadReport() {
            try {
                const res = await fetch(`${API_URL}?action=getReport&fundType=${fundNameFull}&mode=${currentMode}`);
                records = await res.json();
                // จัดเรียงล่าสุดขึ้นบน (ID ล่าสุด)
                records.sort((a, b) => b[0].toString().localeCompare(a[0].toString()));
                renderTable(records);
            } catch (e) { console.error("Data Load Error"); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('quick-table-body');
            tbody.innerHTML = data.map(row => `
                <tr class="hover:bg-blue-50 transition border-b">
                    <td class="p-4 text-xs font-bold text-slate-500">${formatDateShort(row[5])}</td>
                    <td class="p-4 font-normal text-xs text-slate-400">${currentMode === 'ED' ? (row[4] || row[3]) : row[3]}</td>
                    <td class="p-4 font-bold text-slate-800">${row[6]}</td>
                    <td class="p-4 flex justify-center gap-1">
                        <button onclick="printRecord('${row[0]}')" class="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition" title="พิมพ์"><i data-lucide="printer" class="w-4 h-4"></i></button>
                        <button onclick="editRecord('${row[0]}')" class="p-2 text-amber-500 hover:bg-amber-100 rounded-lg transition" title="แก้ไข"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="deleteRecord('${row[0]}')" class="p-2 text-red-400 hover:bg-red-50 rounded-lg transition" title="ลบ"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function editRecord(id) {
            const row = records.find(r => String(r[0]) === String(id));
            if(!row) return;
            isEditMode = true;
            document.getElementById('edit-id').value = row[0];
            document.getElementById('receiptNo').value = row[4];
            document.getElementById('dateInput').value = formatDateShort(row[5]);
            document.getElementById('donorName').value = row[6];
            document.getElementById('taxId').value = row[7];
            document.getElementById('purpose').value = row[8];
            document.getElementById('amount').value = row[9];
            updateThaiText(row[9]);
            document.getElementById('form-title').innerText = "✏️ แก้ไขข้อมูล";
            document.getElementById('btn-text').innerText = "อัปเดตข้อมูล";
            document.getElementById('cancel-btn').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function deleteRecord(id) {
            const confirm = await Swal.fire({ title: 'ยืนยันการลบ?', text: 'ข้อมูลจะหายไปถาวร', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33' });
            if(!confirm.isConfirmed) return;
            toggleLoader(true);
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', data: {id: id} }) });
                Swal.fire('ลบข้อมูลสำเร็จ', '', 'success');
                loadReport();
            } catch (e) { Swal.fire('ผิดพลาด', '', 'error'); }
            toggleLoader(false);
        }

        function resetForm() {
            isEditMode = false;
            document.getElementById('donationForm').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerText = "📝 เพิ่มข้อมูลใหม่";
            document.getElementById('btn-text').innerText = "บันทึกข้อมูล";
            document.getElementById('cancel-btn').classList.add('hidden');
            document.getElementById('amountThai').innerText = "";
            
            // Set Default Purpose
            if (currentFund === 'sangha') {
                document.getElementById('purpose').value = "สมทบทุนกองทุนหอสงฆ์อาพาธ โรงพยาบาลสมเด็จพระยุพราชสว่างแดนดิน";
            } else {
                document.getElementById('purpose').value = "สมทบทุนกองทุนจัดซื้อเครื่องมือแพทย์ โรงพยาบาลสมเด็จพระยุพราชสว่างแดนดิน";
            }

            const now = new Date();
            const thaiYear = now.getFullYear() + 543;
            const day = now.getDate().toString().padStart(2, '0');
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            document.getElementById('dateInput').value = `${day}/${month}/${thaiYear}`;
        }

        function arabicToThaiText(n) {
            const d=["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"], u=["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];
            if(isNaN(n) || n === "" || n === 0) return "";
            let s=n.toString().split('.'), i=s[0], r="";
            for(let j=0;j<i.length;j++){
                let v=parseInt(i[j]), p=i.length-j-1;
                if(v!=0){
                    if(p%6==1&&v==1)r+="";else if(p%6==1&&v==2)r+="ยี่";
                    else if(p%6==0&&v==1&&j>0)r+="เอ็ด";else r+=d[v];
                    r+=u[p%6];
                }
                if(p%6==0&&p>0)r+="ล้าน";
            }
            if(r!="") r+="บาท";
            if(!s[1]||s[1]=="00"||parseInt(s[1])==0)r+="ถ้วน";
            else {
                let c=s[1].length==1?s[1]+"0":s[1].substring(0,2);
                for(let j=0;j<2;j++){
                    let v=parseInt(c[j]), p=1-j;
                    if(v!=0){
                        if(p==1&&v==1)r+="";else if(p==1&&v==2)r+="ยี่";
                        else if(p==0&&v==1&&j>0)r+="เอ็ด";else r+=d[v];
                        r+=p==1?"สิบ":"สตางค์";
                    }
                }
            }
            return r;
        }

        function updateThaiText(v) {
            const d = document.getElementById('amountThai');
            if(!v || isNaN(v)) { d.innerText=""; return; }
            d.innerText = "(" + arabicToThaiText(parseFloat(v)) + ")";
        }

        function formatDateThaiFull(dateStr) {
            if (!dateStr) return "-";
            const dt = parseDate(dateStr);
            return `${dt.d} ${thMonths[dt.m - 1]} ${dt.y}`;
        }

        function filterTable() {
            const k = document.getElementById('searchInput').value.toLowerCase();
            const filtered = records.filter(r => r[6].toLowerCase().includes(k) || (r[3] && r[3].toString().includes(k)) || (r[4] && r[4].toString().includes(k)));
            renderTable(filtered);
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
